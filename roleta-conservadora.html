<!DOCTYPE html>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Roleta Conservadora </title>
    <link rel="stylesheet" href="style.css">
    <style>
    header {
            padding: 20px 0;
        }

        nav ul {
            display: flex;
            justify-content: center;
            list-style: none;
            padding: 0;
            margin: 0 0 20px 0;
            flex-wrap: wrap;
            gap: 15px;
        }

        /* Estilos da Roleta */
        .container-roleta {
            max-width: 900px;
            margin: 20px auto;
            background: #111;
            border: 5px solid #006400;
            padding: 15px;
            min-height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .midia-sorteada {
            max-width: 100%;
            max-height: 70vh;
            border: 4px solid #FFD700;
        }

        /* Estilo para o Iframe de vídeo (Streamable/YouTube) */
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 */
            height: 0;
            width: 100%;
            max-width: 640px;
            border: 4px solid #FFD700;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }

        .btn-girar {
            margin: 20px 0;
            padding: 15px 35px;
            background-color: #006400;
            color: #FFD700;
            font-size: 20px;
            font-weight: bold;
            border: 3px solid #FFD700;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-girar:hover { background-color: #008000; transform: scale(1.05); }

        /* Painel de Áudio */
        .painel-audio {
            background-color: #111;
            border: 1px solid #FFD700;
            padding: 10px;
            margin-bottom: 20px;
            display: inline-block;
            border-radius: 5px;
        }
        .painel-audio span { color: #FFD700; font-weight: bold; margin-right: 15px; font-size: 14px; }
        .btn-audio { background-color: #333; color: #fff; border: 1px solid #555; padding: 5px 15px; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <h1>ROLETA CONSERVADORA</h1>
    </header>

    <nav>
        <ul>
            <li><a href="index.html" class="home-link">🇧🇷<br><span>home</span></a></li>
            <li><a href="bolsonaro-hipotetico.html">Bolsonaro hipotético</a></li>
            <li><a href="roleta-conservadora.html">roleta conservadora</a></li>

        </ul>
    </nav>

    <div class="layout-container">
        <main class="content-area">
            
            <div class="painel-audio">
                <span>22:</span>
                <button class="btn-audio" onclick="playMusica()">▶ PLAY</button>
                <button class="btn-audio stop" onclick="stopMusica()">⏹ STOP</button>
            </div>

            <div class="container-roleta" id="espaco-midia">
                <p style="color: #FFD700;">ORDEM RECEBIDA: AGUARDANDO GIRO...</p>
            </div>

            <button class="btn-girar" onclick="girarNovamente()">GIRAR ROLETA 🔄</button>

            <div id="audio-wiki-container"></div>
        </main>
    </div>

    <script>
        // Configurações
        const limiteImagens = 784;
        const totalItens = 836;
        const pastaMidia = "midia/";
        const extensoesImg = [".jpg", ".png", ".gif"];

        function girarNovamente() {
            const container = document.getElementById('espaco-midia');
            container.innerHTML = '<p style="color: #FFD700;">SORTEANDO...</p>';
            
            const num = Math.floor(Math.random() * totalItens) + 1;

            if (num <= limiteImagens) {
                // LÓGICA PARA IMAGENS (1 até 784)
                tentarImagem(num, 0);
            } else {
                // LÓGICA PARA VÍDEOS (785 até 836)
                // Se você for usar links externos (Streamable), pode criar um objeto com os links aqui
                // Por enquanto, vou assumir que são arquivos locais .mp4
                exibirVideoLocal(num);
            }
        }

        function tentarImagem(num, extIndex) {
            if (extIndex >= extensoesImg.length) {
                document.getElementById('espaco-midia').innerHTML = `<p style="color:red;">Imagem ${num} não encontrada.</p>`;
                return;
            }
            const ext = extensoesImg[extIndex];
            const img = new Image();
            img.src = `${pastaMidia}patriota (${num})${ext}`;
            img.className = "midia-sorteada";
            img.onload = () => {
                const container = document.getElementById('espaco-midia');
                container.innerHTML = "";
                container.appendChild(img);
            };
            img.onerror = () => tentarImagem(num, extIndex + 1);
        }

        function exibirVideoLocal(num) {
            const container = document.getElementById('espaco-midia');
            // Se for arquivo local na Vercel:
            container.innerHTML = `
                <video src="${pastaMidia}patriota (${num}).mp4" 
                       class="midia-sorteada" controls autoplay>
                </video>`;
            
            
            const linksVideos = {
                785: "https://streamable.com/e/52plda",
                786: "https://streamable.com/e/jkee2f",
                787: "https://streamable.com/e/f9vzfd",

            container.innerHTML = `<div class="video-wrapper"><iframe src="${linksVideos[num]}"></iframe></div>`;
            
        }

        // Áudio (YouTube invisível)
        function playMusica() {
            const divAudio = document.getElementById('audio-wiki-container');
            if (divAudio.innerHTML === '') {
                divAudio.innerHTML = `<iframe width="1" height="1" src="https://www.youtube.com/embed/r8j6gT1E6W4?autoplay=1" frameborder="0" allow="autoplay" style="display:none;"></iframe>`;
            }
        }
        function stopMusica() { document.getElementById('audio-wiki-container').innerHTML = ''; }

        window.onload = girarNovamente;
    </script>
</body>
</html>
